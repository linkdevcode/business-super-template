services:
  postgres:
    image: postgres:16-alpine
    container_name: template-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: template_db
      POSTGRES_PASSWORD: template_db
      POSTGRES_DB: template_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  pgadmin_data:
