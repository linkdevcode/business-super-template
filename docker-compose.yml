services:
  db:
    image: postgres:16-alpine
    container_name: template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: template_db
      POSTGRES_PASSWORD: template_db
      POSTGRES_DB: template_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: template-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Kết nối PostgreSQL trong Docker network (host = service name "db")
      DATABASE_URL: Host=db;Port=5432;Database=template_db;Username=template_db;Password=template_db
      # CORS cho frontend chạy ngoài/inside Docker (có thể mở rộng theo nhu cầu)
      CORS__AllowedOrigins__0: http://localhost:5173
      CORS__AllowedOrigins__1: http://localhost:4173
    ports:
      - "5000:8080"
    depends_on:
      - db

  frontend:
    image: node:22-alpine
    container_name: template-frontend
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # URL backend trong Docker Compose (map 5000 -> backend:8080)
      VITE_API_URL: http://localhost:5000
      VITE_APP_URL: http://localhost:5173
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
